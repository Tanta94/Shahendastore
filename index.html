<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shahenda Store | متجر عطور</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page-shell">
    <header class="app-bar">
      <button class="icon-button menu-button" aria-label="Menu">☰</button>
      <div class="brand-block">
        <span class="brand-mark">ش</span>
        <div class="brand-copy">
          <span class="brand-name">Shahenda Store</span>
          <span class="brand-tag">متجر العطور المختار</span>
        </div>
      </div>
      <div class="app-actions">
        <button class="icon-button" aria-label="Search">🔍</button>
        <button class="icon-button cart-button" aria-label="Cart">🛒<span id="cartCount">0</span></button>
      </div>
    </header>

    <main class="products-section">
      <div class="section-header">
        <h2>تسوّق العطور المختارة</h2>
        <p>أفضل العروض وأشهر الماركات في مكان واحد.</p>
      </div>
      <div class="product-grid" id="productGrid"></div>

      <section class="order-section" id="orderSection">
        <div class="section-heading">
          <h3>تفاصيل الطلب</h3>
          <p>اختر الحجم، نوع العبوة، الكمية، وأرسل الطلب مباشرة.</p>
        </div>
        <div class="order-panel" id="orderPanel">
          <div class="order-top">
            <div class="order-image" id="orderProductImage">ع</div>
            <div class="order-info">
              <p class="order-brand" id="orderBrand">اختر منتج</p>
              <h3 id="orderName">لم يتم اختيار أي منتج بعد</h3>
            </div>
          </div>

          <div class="order-fields">
            <label>
              الحجم
              <select id="sizeSelect"></select>
            </label>
            <label>
              نوع العبوة
              <select id="bottleSelect">
                <option value="Automatic">Automatic Bottle</option>
                <option value="Refill">Refill</option>
              </select>
            </label>
            <label>
              الكمية
              <input id="quantityInput" type="number" min="1" value="1" />
            </label>
            <label>
              كود الخصم
              <input id="promoInput" type="text" placeholder="أدخل الكود" />
            </label>
          </div>

          <div class="summary-card">
            <div class="summary-row"><span>السعر</span><span id="subtotalValue">0 EGP</span></div>
            <div class="summary-row"><span>الخصم</span><span id="discountValue">0 EGP</span></div>
            <div class="summary-row total-row"><span>الإجمالي</span><span id="totalValue">0 EGP</span></div>
          </div>

          <div class="customer-fields">
            <label>
              الاسم الكامل
              <input id="customerName" type="text" placeholder="الاسم" />
            </label>
            <label>
              البريد الإلكتروني
              <input id="customerEmail" type="email" placeholder="example@mail.com" />
            </label>
            <label>
              رقم الهاتف
              <input id="customerPhone" type="tel" placeholder="0100xxxxxxx" />
            </label>
          </div>

          <button id="submitOrder" class="button button-primary">تأكيد الطلب</button>
          <div id="orderStatus" class="order-status"></div>
        </div>
      </section>
    </main>

    <nav class="bottom-nav">
      <button class="nav-item active"><span>🏬</span><span>Shop</span></button>
      <button class="nav-item"><span>♡</span><span>Wishlist</span></button>
      <button class="nav-item"><span>🛒</span><span>Cart</span></button>
      <button class="nav-item"><span>👤</span><span>Account</span></button>
      <button class="nav-item"><span>🔍</span><span>Search</span></button>
    </nav>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js" defer></script>
  <script src="script.js" defer></script>
</body>
</html>
